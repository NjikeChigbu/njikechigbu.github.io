<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Abia State Polytechnic Web Map</title>

    <!-- Mapbox GL JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.css"
          rel="stylesheet">

    <script src="https://api.mapbox.com/mapbox-gl-js/v3.5.1/mapbox-gl.js"></script>

    <!-- Mapbox Geocoder -->
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>

    <link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css"
          rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600&display=swap"
          rel="stylesheet">

    <!-- Local CSS -->
    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <div id="map"></div>

    <div class="map-overlay" id="features">

        <h2>Abia State Polytechnic, Aba</h2>

        <div id="pd">

            <p>Hover over the features!</p>

        </div>

    </div>

    <div class="map-overlay" id="legend">

        <strong>Legend</strong>

    </div>

    <!-- Local JavaScript -->
    <script src="script.js"></script>

</body>

</html>
